<title>Test Tema 6 — Estatuto de Autonomía de la Comunitat Valenciana | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--naranja:#d97706;--naranja-claro:#fef3c7;--naranja-borde:#f59e0b;--azul-oscuro:#1e293b;--texto:#374151;--texto-suave:#6b7280;--borde:#e5e7eb;--fondo:#fafaf9;--blanco:#ffffff;--verde:#166534;--verde-bg:#f0fdf4;--verde-borde:#86efac;--rojo:#991b1b;--rojo-bg:#fef2f2;--rojo-borde:#fca5a5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Sans 3',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh;font-size:16px;line-height:1.6;}
  header{background:var(--blanco);border-bottom:1px solid var(--borde);}
  .header-top{max-width:860px;margin:0 auto;padding:1.4rem 1.5rem 1rem;display:flex;align-items:flex-start;gap:1.2rem;}
  .header-logo{width:48px;height:48px;border-radius:8px;object-fit:contain;flex-shrink:0;}
  .header-textos{flex:1;}
  .header-site{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--naranja);font-weight:600;margin-bottom:3px;}
  .header-titulo{font-family:'Lora',serif;font-size:clamp(1.1rem,3.5vw,1.65rem);font-weight:700;color:var(--azul-oscuro);line-height:1.2;}
  .header-sub{font-size:0.88rem;color:var(--texto-suave);margin-top:4px;}
  .header-meta{background:var(--naranja-claro);border-top:1px solid #fde68a;padding:0.55rem 1.5rem;}
  .header-meta-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;font-size:0.83rem;color:#92400e;font-weight:500;}
  .barra-wrap{position:sticky;top:0;z-index:100;background:var(--blanco);border-bottom:1px solid var(--borde);padding:0.6rem 1.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
  .barra-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:1rem;}
  .barra-track{flex:1;height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
  .barra-fill{height:100%;background:var(--naranja);border-radius:99px;transition:width 0.35s ease;width:0%;}
  .barra-num{font-size:13px;font-weight:600;color:var(--azul-oscuro);white-space:nowrap;min-width:52px;}
  .barra-score{font-size:13px;color:var(--texto-suave);white-space:nowrap;}
  .barra-score .ok{color:var(--verde);font-weight:600;}
  .barra-score .ko{color:var(--rojo);font-weight:600;}
  main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;}
  .card{background:var(--blanco);border:1px solid var(--borde);border-radius:10px;padding:1.5rem 1.6rem;margin-bottom:1.4rem;transition:box-shadow 0.2s;}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.06);}
  .card-num{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--naranja);margin-bottom:0.5rem;}
  .card-pregunta{font-family:'Lora',serif;font-size:1rem;font-weight:600;line-height:1.55;color:var(--azul-oscuro);margin-bottom:1.1rem;}
  .opciones{display:flex;flex-direction:column;gap:0.45rem;}
  .opcion{display:flex;align-items:flex-start;gap:0.7rem;padding:0.7rem 1rem;border:1.5px solid var(--borde);border-radius:7px;cursor:pointer;background:var(--blanco);text-align:left;font-family:'Source Sans 3',sans-serif;font-size:0.93rem;color:var(--texto);line-height:1.5;transition:border-color 0.15s,background 0.15s;width:100%;}
  .opcion:hover:not(:disabled){border-color:var(--naranja-borde);background:var(--naranja-claro);}
  .opcion .letra{font-weight:700;color:var(--naranja);min-width:18px;font-size:0.85rem;margin-top:2px;flex-shrink:0;}
  .opcion.correcta{border-color:var(--verde-borde);background:var(--verde-bg);color:var(--verde);}
  .opcion.correcta .letra{color:#15803d;}
  .opcion.incorrecta{border-color:var(--rojo-borde);background:var(--rojo-bg);color:var(--rojo);}
  .opcion.incorrecta .letra{color:var(--rojo);}
  .opcion:disabled{cursor:default;}
  .explicacion{display:none;margin-top:1rem;padding:0.9rem 1rem 0.9rem 1.1rem;background:#fffbeb;border-left:3px solid var(--naranja);border-radius:0 6px 6px 0;font-size:0.875rem;line-height:1.65;color:var(--texto);}
  .explicacion.visible{display:block;animation:fadeIn 0.22s ease;}
  .explicacion strong{color:var(--azul-oscuro);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
  .resultado{display:none;background:var(--blanco);border:1px solid var(--borde);border-radius:12px;padding:2.5rem 2rem 2rem;margin:1.5rem 0 2rem;text-align:center;}
  .resultado.visible{display:block;animation:fadeIn 0.3s ease;}
  .resultado-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--naranja);font-weight:600;margin-bottom:0.5rem;}
  .resultado h2{font-family:'Lora',serif;font-size:1.75rem;font-weight:700;color:var(--azul-oscuro);margin-bottom:0.3rem;}
  .resultado-nota{font-size:3.2rem;font-weight:700;color:var(--azul-oscuro);line-height:1;margin:1rem 0 0.3rem;font-family:'Lora',serif;}
  .resultado-nota span{color:var(--naranja);}
  .calif-badge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:0.9rem;font-weight:600;margin:0.6rem 0 1.5rem;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:0 0 1.5rem;}
  .stat{background:var(--fondo);border:1px solid var(--borde);border-radius:8px;padding:0.9rem 0.5rem;}
  .stat-num{font-size:1.9rem;font-weight:700;font-family:'Lora',serif;}
  .stat-lab{font-size:0.78rem;color:var(--texto-suave);margin-top:2px;}
  .resultado-hint{font-size:0.85rem;color:var(--texto-suave);margin-bottom:1.2rem;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0.7rem 1.6rem;border-radius:7px;font-family:'Source Sans 3',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;}
  .btn-naranja{background:var(--naranja);color:white;}
  .btn-naranja:hover{background:#b45309;transform:translateY(-1px);}
  .divider{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--texto-suave);margin:2rem 0 1.5rem;display:flex;align-items:center;gap:1rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--borde);}
  @media(max-width:580px){main{padding:1.2rem 1rem 4rem;}.card{padding:1.1rem;}.stats{grid-template-columns:1fr 1fr;}.header-top{padding:1rem;gap:0.8rem;}.header-meta{padding:0.5rem 1rem;}}
</style>

<script>
const BANCO = [
  // ── TÍTULO I ──
  {p:"El artículo 1.1 del Estatuto de Autonomía de la Comunitat Valenciana (EACV) reconoce la naturaleza del pueblo valenciano. ¿Cómo se define y en qué marco se constituye como Comunidad Autónoma?",ops:["Como región histórica dentro de la unidad del Estado español, sin reconocimiento de nacionalidad","Como expresión de su identidad diferenciada como nacionalidad histórica, dentro de la unidad de la Nación española, en ejercicio del derecho de autogobierno que la CE reconoce a toda nacionalidad","Como pueblo soberano con derecho de autodeterminación en el marco europeo","Como comunidad cultural con autonomía administrativa pero sin carácter de nacionalidad histórica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 1.1 EACV establece que el pueblo valenciano, «históricamente organizado como Reino de Valencia, se constituye en Comunidad Autónoma dentro de la unidad de la Nación española, como expresión de su identidad diferenciada como nacionalidad histórica y en el ejercicio del derecho de autogobierno que la Constitución Española reconoce a toda nacionalidad»."},
  {p:"Según el artículo 1.2 EACV, ¿qué es el Estatuto de Autonomía para la Comunitat Valenciana?",ops:["Una ley orgánica del Estado con rango superior a cualquier ley autonómica","La norma institucional básica de la Comunitat Valenciana, por la que ésta se rige","Un tratado de autogobierno entre el Estado y la Comunitat Valenciana","El reglamento orgánico de las instituciones autonómicas aprobado por Les Corts"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 1.2 EACV define el Estatuto como «la expresión de la voluntad democrática y del derecho de autogobierno del pueblo valenciano» y establece que la Comunitat Valenciana «se rige por el presente Estatuto, que es su norma institucional básica». Esta definición conecta con el art. 147.1 CE."},
  {p:"¿Qué territorio comprende la Comunitat Valenciana según el artículo 2 EACV?",ops:["El de los municipios integrados en las provincias de Alicante, Castellón y Valencia","El territorio histórico del Reino de Valencia, incluyendo algunas comarcas limítrofes","Las provincias de Valencia y Alicante, con régimen especial para Castellón","El territorio delimitado por los límites históricos del antiguo Reino de Valencia"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 2 EACV es preciso y lacónico: «El territorio de la Comunitat Valenciana comprende el de los municipios integrados en las provincias de Alicante, Castellón y Valencia». La definición es puramente provincial, sin referencias a territorios históricos."},
  {p:"Según el artículo 3.1 EACV, ¿quiénes gozan de la condición política de valencianos?",ops:["Los nacidos en territorio valenciano o con al menos uno de sus progenitores nacidos en la Comunitat","Todos los ciudadanos españoles que tengan o adquieran vecindad administrativa en cualquiera de los municipios de la Comunitat Valenciana","Solo los ciudadanos españoles con más de cinco años de empadronamiento en la Comunitat","Los ciudadanos españoles y los ciudadanos de la UE residentes legalmente en la Comunitat"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.1 EACV establece que «gozan de la condición política de valencianos todos los ciudadanos españoles que tengan o adquieran vecindad administrativa en cualquiera de los municipios de la Comunitat Valenciana». El criterio es la vecindad administrativa, no el nacimiento ni la residencia prolongada."},
  {p:"El artículo 3.3 EACV reconoce derechos a las comunidades de valencianos asentadas fuera de la Comunitat. ¿Qué derecho les reconoce?",ops:["El derecho al voto en las elecciones a Les Corts Valencianes","El derecho a solicitar el reconocimiento de su valencianidad, entendida como el derecho a participar, colaborar y compartir la vida social y cultural del pueblo valenciano","El derecho a recibir financiación directa de la Generalitat para sus actividades culturales","El derecho a ser representadas en Les Corts mediante escaños reservados"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 3.3 EACV reconoce a las comunidades de valencianos asentadas fuera de la Comunitat «el derecho a solicitar, como tales, el reconocimiento de su valencianidad entendida como el derecho a participar, colaborar y compartir la vida social y cultural del pueblo valenciano». Una ley de Les Corts regulará el alcance de este reconocimiento."},
  {p:"El artículo 4.1 EACV describe la Senyera, bandera de la Comunitat Valenciana. ¿Cómo está compuesta?",ops:["Cuatro barras rojas sobre fondo amarillo, sin añadidos adicionales","La tradicional Senyera compuesta por cuatro barras rojas sobre fondo amarillo, coronadas sobre franja azul junto al asta","Tres barras rojas sobre fondo dorado con el escudo de la Comunitat en el centro","Cuatro barras horizontales rojas sobre fondo amarillo con franja azul en el lateral derecho"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 4.1 EACV establece que «la Bandera de la Comunitat Valenciana es la tradicional Senyera compuesta por cuatro barras rojas sobre fondo amarillo, coronadas sobre franja azul junto al asta». La franja azul junto al asta es el elemento distintivo de la Senyera valenciana respecto a otras banderas de la Corona de Aragón."},
  {p:"Según el artículo 5 EACV, ¿dónde tiene su sede la Generalitat?",ops:["En el Palacio de la Generalitat, en la ciudad de Valencia","En el Palau de les Corts, en la ciudad de Valencia","En el edificio de la Presidencia, en la ciudad de Valencia","En el Palacio de los Borja, en la ciudad de Valencia"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 5.1 EACV establece que «la sede de la Generalitat será el palacio de este nombre, en la ciudad de Valencia». El Palacio de los Borja es la sede de Les Corts Valencianes (art. 21.2), no de la Generalitat como institución."},
  {p:"El artículo 6.1 y 6.2 EACV regula el régimen lingüístico de la Comunitat. ¿Cuál es la lengua propia y cuáles son las lenguas oficiales?",ops:["La lengua propia y única oficial es el valenciano; el castellano es la lengua de uso preferente en la Administración","La lengua propia es el valenciano; son oficiales tanto el valenciano como el castellano","La lengua propia y oficial es el valenciano; el castellano es oficial del Estado pero no de la Comunitat","El castellano es la única lengua oficial; el valenciano tiene reconocimiento cultural pero no oficial"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 6.1 EACV establece que «la lengua propia de la Comunitat Valenciana es el valenciano». El art. 6.2 añade que «el idioma valenciano es el oficial en la Comunitat Valenciana, al igual que lo es el castellano, que es el idioma oficial del Estado». Hay cooficialidad de ambas lenguas."},
  {p:"El artículo 6.8 EACV crea una institución específica para la normativa lingüística del valenciano. ¿Cuál es?",ops:["La Conselleria de Cultura i Esport, competente en materia lingüística","L'Acadèmia Valenciana de la Llengua, institución normativa del idioma valenciano","El Consell Valenciá de Cultura, como órgano asesor en materia lingüística","La Junta Qualificadora de Coneixements de Valencià"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 6.8 EACV establece que «L'Acadèmia Valenciana de la Llengua es la institución normativa del idioma valenciano». Tiene carácter de institución de la Generalitat (art. 20.3) y su normativa lingüística es de aplicación obligatoria en todas las administraciones públicas de la Comunitat (art. 41)."},
  // ── TÍTULO II ──
  {p:"El artículo 9.2 EACV reconoce el derecho a una buena administración. ¿Qué derechos específicos incluye?",ops:["El derecho a la transparencia, el acceso a la información y la participación ciudadana en la gestión pública","El derecho a que las administraciones públicas de la Generalitat traten sus asuntos de modo equitativo e imparcial, en plazo razonable, y a gozar de servicios públicos de calidad","El derecho a la tutela judicial efectiva y a la indemnización por funcionamiento anormal de la Administración","El derecho a recurrir cualquier acto administrativo ante el Síndic de Greuges"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 9.2 EACV establece que «todos los ciudadanos tienen derecho a que las administraciones públicas de la Generalitat traten sus asuntos de modo equitativo e imparcial y en un plazo razonable y a gozar de servicios públicos de calidad». Además, los ciudadanos valencianos tienen derecho a dirigirse a la Administración en cualquiera de las dos lenguas oficiales."},
  {p:"El artículo 15 EACV reconoce un derecho social específico para los ciudadanos valencianos en estado de necesidad. ¿De qué derecho se trata?",ops:["El derecho a una prestación básica de integración social","El derecho a la solidaridad y a una renta de ciudadanía, con el fin de combatir la pobreza y facilitar la inserción social","El derecho a la asistencia jurídica gratuita y a la orientación laboral","El derecho a una vivienda de protección oficial con carácter prioritario"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 15 EACV establece que «la Generalitat garantiza el derecho de los ciudadanos valencianos en estado de necesidad a la solidaridad y a una renta de ciudadanía en los términos previstos en la Ley». Es una garantía constitucional autonómica frente a la pobreza extrema."},
  {p:"El artículo 17.1 EACV reconoce un derecho relativo al agua. ¿Cuál es?",ops:["El derecho a la gestión autónoma de las cuencas hidrográficas íntegramente valencianas","El derecho a disponer del abastecimiento suficiente de agua de calidad y el de redistribución de los sobrantes de aguas de cuencas excedentarias, atendiendo a criterios de sostenibilidad","El derecho a la expropiación de infraestructuras hidráulicas del Estado en territorio valenciano","El derecho a establecer cánones sobre el uso del agua procedente de otras cuencas"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 17.1 EACV garantiza «el derecho de los valencianos y valencianas a disponer del abastecimiento suficiente de agua de calidad» y reconoce «el derecho de redistribución de los sobrantes de aguas de cuencas excedentarias atendiendo a criterios de sostenibilidad de acuerdo con la Constitución y la legislación estatal»."},
  // ── TÍTULO III: LA GENERALITAT ──
  {p:"El artículo 20 EACV define la Generalitat y sus instituciones. ¿Cuáles forman parte de la Generalitat según el artículo 20.2?",ops:["Les Corts, el President, el Consell y el Tribunal Superior de Justicia","Les Corts Valencianes o les Corts, el President y el Consell","Les Corts, el President, el Consell y el Síndic de Greuges","Les Corts, el President, el Consell y la Sindicatura de Comptes"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 20.2 EACV establece que «forman parte de la Generalitat les Corts Valencianes o les Corts, el President y el Consell». Son los tres órganos constitutivos del poder autonómico. El art. 20.3 añade otras instituciones (Sindicatura de Comptes, Síndic de Greuges, etc.) pero no como parte del núcleo institucional del art. 20.2."},
  {p:"¿Cuáles son las instituciones de la Generalitat enumeradas en el artículo 20.3 EACV, además de las del artículo 20.2?",ops:["El Tribunal Superior de Justicia, el Consell Jurídic Consultiu y el Consell del Audiovisual","La Sindicatura de Comptes, el Síndic de Greuges, el Consell Valenciá de Cultura, L'Acadèmia Valenciana de la Llengua, el Consell Jurídic Consultiu y el Comité Econòmic i Social","La Junta de Seguridad, el Comité Econòmic i Social y el Defensor del Poble","El Consell Valenciá de Cultura, la Acadèmia Valenciana de la Llengua y el Tribunal de Comptes Valencià"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 20.3 EACV enumera como instituciones de la Generalitat: la Sindicatura de Comptes, el Síndic de Greuges, el Consell Valenciá de Cultura, L'Acadèmia Valenciana de la Llengua, el Consell Jurídic Consultiu y el Comité Econòmic i Social. Son seis instituciones complementarias a las del art. 20.2."},
  {p:"El artículo 21.1 EACV regula Les Corts Valencianes. ¿Qué potestad les corresponde y cuáles son sus características?",ops:["La potestad ejecutiva dentro de la Comunitat Valenciana; son soberanas y autónomas","La potestad legislativa dentro de la Comunitat Valenciana, representan al pueblo, son inviolables y gozan de autonomía","La potestad reglamentaria y de control del Consell; son independientes del Consell","La potestad constituyente autonómica y la función presupuestaria exclusiva"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 21.1 EACV establece que «la potestad legislativa dentro de la Comunitat Valenciana corresponde a Les Corts, que representan al pueblo. Les Corts son inviolables y gozan de autonomía». La inviolabilidad se predica de la institución (no puede ser objeto de violencia o coacción) y la autonomía se refiere a su organización interna."},
  {p:"¿Cuál es la sede de Les Corts Valencianes según el artículo 21.2 EACV?",ops:["El Palacio de la Generalitat, en Valencia","El Palacio de los Borja, en la ciudad de Valencia","El Palau de les Corts, en la ciudad de Valencia","El edificio histórico de la Diputación, en la ciudad de Valencia"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 21.2 EACV establece que «Les Corts tienen su sede en el Palacio de los Borja de la ciudad de Valencia». Pueden celebrar sesiones en otros lugares de la Comunitat cuando sus órganos de gobierno así lo acuerden."},
  {p:"El artículo 23.1 EACV fija el número mínimo de Diputados de Les Corts. ¿Cuántos son?",ops:["No inferior a setenta y cinco Diputados","No inferior a ochenta y nueve Diputados","No inferior a noventa y nueve Diputados","No inferior a ciento nueve Diputados"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 23.1 EACV establece que «Les Corts estarán constituidas por un número de Diputados y Diputadas no inferior a noventa y nueve». Son elegidos por sufragio universal, libre, igual, directo y secreto, con criterios de proporcionalidad."},
  {p:"Según el artículo 23.3 EACV, ¿de qué garantías gozan los miembros de Les Corts en el ejercicio de sus funciones?",ops:["Inviolabilidad absoluta por todos los actos realizados durante su mandato y aforamiento ante el Tribunal Supremo","Inviolabilidad por las opiniones manifestadas y votos emitidos en el ejercicio de sus funciones (incluso después de cesar); inmunidad durante el mandato salvo flagrante delito; aforamiento ante el TSJ de la CV para actos en territorio valenciano y ante el TS fuera de él","Inmunidad total durante el mandato y aforamiento siempre ante el Tribunal Supremo","Inviolabilidad solo para los discursos en pleno y aforamiento ante la Sala Civil del TSJ"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 23.3 EACV establece tres garantías: (1) inviolabilidad permanente por opiniones y votos en el ejercicio de sus funciones; (2) inmunidad durante el mandato —no pueden ser detenidos salvo flagrante delito—, correspondiendo la inculpación al TSJ de la CV en territorio valenciano; (3) aforamiento civil por actos y opiniones en el ejercicio del cargo."},
  {p:"¿Cuánto dura el mandato de Les Corts según el artículo 23.4 EACV y quién puede disolver anticipadamente la Cámara?",ops:["Cinco años; puede disolverla el Consell por acuerdo mayoritario","Cuatro años; puede disolverla el President de la Generalitat mediante Decreto","Cuatro años; puede disolverla Les Corts mediante acuerdo de dos tercios","Cuatro años; solo puede disolverse si no hay investidura tras dos meses"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 23.4 EACV establece que «Les Corts son elegidas por cuatro años» y que la disolución se realizará «por medio de Decreto del President de la Generalitat». La disolución anticipada es una facultad del President, en los términos que establezca la Ley del Consell."},
  {p:"El artículo 24 EACV fija los requisitos de la Ley Electoral Valenciana y la representación mínima por circunscripción. ¿Cuántos diputados mínimos garantiza por provincia?",ops:["Un mínimo de 15 Diputados por cada circunscripción provincial","Un mínimo de 20 Diputados por cada circunscripción provincial","Un mínimo de 25 Diputados por cada circunscripción provincial","Un mínimo de 30 Diputados por cada circunscripción provincial"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 24 EACV establece que la Ley Electoral Valenciana «garantizará un mínimo de 20 Diputados por cada circunscripción provincial». La ley debe ser aprobada por dos terceras partes de Les Corts y la desproporción del sistema no puede ser superior a la relación de uno a tres."},
  {p:"Según el artículo 24 EACV, ¿qué mayoría se requiere para aprobar la Ley Electoral Valenciana?",ops:["Mayoría simple de Les Corts","Mayoría absoluta de Les Corts","Dos terceras partes de Les Corts","Tres quintas partes de Les Corts"],c:2,exp:"<strong>Respuesta correcta: C.</strong> El art. 24 EACV exige que la Ley Electoral Valenciana «será aprobada en votación de conjunto por las dos terceras partes de Les Corts». Esta mayoría reforzada garantiza un amplio consenso político en la regulación del sistema electoral autonómico."},
  {p:"El artículo 25.1 EACV regula el Reglamento de Les Corts. ¿Qué mayoría se exige para su aprobación y qué rango tiene?",ops:["Mayoría simple; tiene rango de decreto legislativo","Mayoría absoluta; tendrá rango de Ley","Dos tercios; tiene rango de ley orgánica autonómica","Tres quintos; tiene rango de norma institucional básica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 25.1 EACV establece que Les Corts «aprobarán, por mayoría absoluta, su Reglamento que tendrá rango de Ley». La mayoría absoluta y el rango de ley son los dos elementos clave: la mayoría refuerza su legitimación y el rango de ley lo protege del control contencioso-administrativo."},
  {p:"El artículo 25.3 EACV establece los períodos ordinarios de sesiones de Les Corts. ¿Cuáles son y cuánto duran como mínimo?",ops:["Dos períodos al año, de al menos seis meses; el primero en octubre y el segundo en marzo","Dos períodos ordinarios al año, de al menos ocho meses; el primero se inicia en septiembre y el segundo en febrero","Tres períodos ordinarios al año de al menos cuatro meses cada uno","Dos períodos ordinarios al año sin duración mínima fijada"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 25.3 EACV establece que «los períodos ordinarios serán dos por año y durarán como mínimo ocho meses. El primero se iniciará en septiembre y en febrero el segundo». La duración mínima de ocho meses en total garantiza una actividad parlamentaria continua."},
  {p:"Según el artículo 25.3 EACV, ¿quiénes pueden pedir la convocatoria de sesiones extraordinarias de Les Corts?",ops:["Solo el President de la Generalitat o el Consell","El Consell, la Diputación Permanente o una quinta parte de los Diputados","Solo la Mesa de Les Corts o el Grupo Parlamentario mayoritario","El Consell o la mayoría absoluta de los Diputados"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 25.3 EACV establece que las sesiones extraordinarias se convocan «a propuesta del Consell, de la Diputación Permanente o a petición de una quinta parte de los Diputados y Diputadas o del número de Grupos Parlamentarios que determine el Reglamento». Son tres los sujetos legitimados: Consell, Diputación Permanente y una quinta parte de los Diputados."},
  {p:"El artículo 25.5 EACV regula la promulgación de las leyes de la Generalitat. ¿En nombre de quién las promulga el President y en qué plazo deben publicarse?",ops:["En nombre de la Generalitat; plazo de treinta días desde su aprobación","En nombre del Rey; en el plazo de quince días desde su aprobación, en las dos lenguas oficiales en el DOGV","En nombre del pueblo valenciano; en el plazo de veinte días desde su aprobación","En nombre del Estado; en el plazo de diez días hábiles desde su aprobación"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 25.5 EACV establece que «las leyes de la Generalitat serán promulgadas, en nombre del Rey, por su President y publicadas, en las dos lenguas oficiales en el 'Diario Oficial de la Generalitat' en el plazo de quince días desde su aprobación». La entrada en vigor se rige por la fecha de publicación en el DOGV."},
  {p:"¿Cómo se elige al President de la Generalitat según el artículo 27.1 EACV?",ops:["Es elegido directamente por los ciudadanos mediante sufragio universal y nombrado por el Rey","Es elegido por Les Corts de entre sus miembros y nombrado por el Rey","Es designado por el partido más votado y confirmado por Les Corts","Es propuesto por el Consell y ratificado por Les Corts por mayoría absoluta"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 27.1 EACV establece que «el President de la Generalitat será elegido por Les Corts de entre sus miembros y nombrado por el Rey». La facultad de presentar candidatos corresponde a los Grupos Parlamentarios."},
  {p:"El artículo 27.4 EACV regula las votaciones de investidura. ¿Qué mayoría se exige en primera y en segunda votación?",ops:["Primera: mayoría de dos tercios; segunda (48 h después): mayoría absoluta","Primera: mayoría absoluta de los miembros de derecho; segunda (48 h después): mayoría simple","Primera y segunda votación: siempre mayoría absoluta","Primera: mayoría simple; segunda: mayoría absoluta"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 27.4 EACV establece que «para la elección hace falta la mayoría absoluta de los miembros de derecho de Les Corts en primera votación. Si no se logra esta mayoría, la votación se repetirá cuarenta y ocho horas después y será suficiente la mayoría simple para ser elegido»."},
  {p:"Si transcurren dos meses desde la primera votación de investidura sin que ningún candidato obtenga la confianza, ¿qué prevé el artículo 27.6 EACV?",ops:["El Consell en funciones asume plenas competencias hasta nueva investidura","El Presidente de Les Corts, por acuerdo de la Mesa, disolverá la Cámara y el President en funciones convocará nuevas elecciones","El Tribunal Superior de Justicia convoca elecciones de oficio","Las Cortes Generales intervienen para garantizar la gobernabilidad autonómica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 27.6 EACV establece que «si transcurrido el plazo de dos meses, a partir de la primera votación de investidura, ningún candidato obtuviera la confianza de Les Corts, el Presidente de Les Corts, por acuerdo de la Mesa, disolverá la Cámara y el President de la Generalitat en funciones convocará nuevas elecciones»."},
  {p:"El artículo 28.1 EACV define las funciones del President de la Generalitat. ¿Cuáles son?",ops:["Dirige la Administración, promulga las leyes y representa al Estado en la Comunitat","Dirige la acción del Consell, coordina sus funciones y ostenta la más alta representación de la Comunitat Valenciana, así como la ordinaria del Estado en ésta","Preside Les Corts, dirige la política exterior autonómica y ejerce el mando de la Policía Autónoma","Ejerce la potestad reglamentaria, coordina las administraciones locales y representa a la Comunitat en Europa"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 28.1 EACV establece que «el President de la Generalitat, que también lo es del Consell, dirige la acción del Consell, coordina las funciones de éste y ostenta la más alta representación de la Comunitat Valenciana, así como la ordinaria del Estado en ésta»."},
  {p:"La moción de censura autonómica se regula en el artículo 28.2 EACV. ¿Qué mayoría se requiere para aprobarla y cuántos diputados deben proponerla como mínimo?",ops:["Mayoría simple; propuesta por al menos una décima parte de los Diputados","Mayoría absoluta; propuesta como mínimo por la quinta parte de los Diputados, con inclusión de candidato a la Presidencia","Mayoría de dos tercios; propuesta por al menos un tercio de los Diputados","Mayoría absoluta; propuesta por al menos la décima parte de los Diputados"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 28.2 EACV establece que «Les Corts pueden exigir la responsabilidad del Consell por medio de la adopción por mayoría absoluta de la moción de censura, propuesta como mínimo por la quinta parte de los Diputados y Diputadas y que deberá incluir un candidato a la Presidencia». La moción es constructiva al igual que en el modelo estatal."},
  {p:"¿Cuántos días deben transcurrir desde la presentación de la moción de censura autonómica antes de que pueda votarse, según el artículo 28.2 EACV?",ops:["Tres días","Cinco días","Siete días","Diez días"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 28.2 EACV establece que «la moción de censura no podrá ser votada hasta cinco días después de su presentación. Durante los dos primeros días de este plazo podrán presentarse propuestas alternativas». Este plazo es idéntico al del modelo estatal (art. 113.3 CE)."},
  {p:"El artículo 28.4 EACV regula la disolución anticipada de Les Corts por el President. ¿Qué limitación expresa establece?",ops:["No puede disolver Les Corts durante el primer año de su mandato","No puede disolver Les Corts cuando se encuentre en tramitación una moción de censura que reúna los requisitos exigidos en el Reglamento de Les Corts","No puede disolver Les Corts más de una vez por legislatura","No puede disolver Les Corts sin el refrendo del Consell en pleno"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 28.4 EACV establece que el President, con acuerdo previo del Consell, puede disolver Les Corts mediante Decreto «excepto cuando se encuentre en tramitación una moción de censura que reúna los requisitos exigidos en el Reglamento de Les Corts». Esta limitación es equivalente a la del art. 115.2 CE para el Presidente del Gobierno."},
  {p:"El artículo 29.1 EACV define el Consell. ¿Cuáles son sus dos potestades principales?",ops:["La potestad legislativa delegada y la potestad tributaria","La potestad ejecutiva y reglamentaria; dirige la Administración bajo la autoridad de la Generalitat","La potestad de control parlamentario y la potestad presupuestaria","La potestad legislativa en materias de urgencia y la potestad organizativa"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 29.1 EACV establece que «el Consell es el órgano colegiado de gobierno de la Generalitat, que ostenta la potestad ejecutiva y reglamentaria. En particular, dirige la Administración, que se encuentra bajo la autoridad de la Generalitat»."},
  {p:"Según el artículo 30 EACV, ¿cómo responde el Consell ante Les Corts?",ops:["De forma individual cada conseller por su área de gestión","Políticamente de forma solidaria ante Les Corts, sin perjuicio de la responsabilidad directa de cada miembro por su gestión","Solo el President responde ante Les Corts; los consellers son responsables ante él","De forma solidaria ante el Senado en las materias que afecten al Estado autonómico"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 30 EACV establece que «el Consell responde políticamente de forma solidaria ante Les Corts, sin perjuicio de la responsabilidad directa de cada miembro por su gestión». El modelo es idéntico al del art. 108 CE para el Gobierno estatal."},
  {p:"La cuestión de confianza autonómica del artículo 30 EACV puede plantearse sobre tres objetos distintos. ¿Cuáles son?",ops:["Un proyecto de ley orgánica, una declaración de política exterior o el presupuesto anual","Su programa, una decisión política o un proyecto de ley","Una ley de bases, una declaración de política social o el plan de gobierno","El programa de gobierno, la política lingüística o el presupuesto de la Generalitat"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 30 EACV establece que el President «puede plantear ante Les Corts la cuestión de confianza sobre su programa, una decisión política o un proyecto de ley». A diferencia del modelo estatal (art. 112 CE, que solo admite programa o declaración de política general), el Estatuto amplía el objeto añadiendo un proyecto de ley."},
  {p:"El artículo 33.1 EACV regula el Tribunal Superior de Justicia de la Comunitat Valenciana. ¿Cuál es su posición en el sistema judicial?",ops:["Es el único tribunal competente para resolver todos los conflictos en la Comunitat, con exclusión del Tribunal Supremo","Es el órgano jurisdiccional en el que culmina la organización judicial en el ámbito territorial de la Comunitat Valenciana, de acuerdo con lo establecido en la Constitución","Es un tribunal especial para asuntos de Derecho civil foral valenciano únicamente","Es el tribunal de apelación de todos los Juzgados de Primera Instancia de la Comunitat"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 33.1 EACV establece que «el Tribunal Superior de Justicia de la Comunitat Valenciana es el órgano jurisdiccional en el que culmina la organización judicial en el ámbito territorial de la Comunitat Valenciana, de acuerdo con lo establecido en la Constitución». Sin perjuicio, en todo caso, de las competencias del Tribunal Supremo."},
  {p:"¿Cómo se nombra al Presidente del Tribunal Superior de Justicia de la Comunitat Valenciana según el artículo 34.1 EACV?",ops:["Por el Consell a propuesta de Les Corts","Por el Rey a propuesta del Consejo General del Poder Judicial","Por Les Corts a propuesta del Consell Jurídic Consultiu","Por el Ministerio de Justicia a propuesta del TSJ de la CV"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 34.1 EACV establece que «el Presidente del Tribunal Superior de Justicia de la Comunitat Valenciana será nombrado por el Rey a propuesta del Consejo General del Poder Judicial». La competencia de nombramiento corresponde al CGPJ, igual que para el resto de presidentes de TSJ en España."},
  {p:"El artículo 38 EACV regula el Síndic de Greuges. ¿Cuál es su naturaleza y función?",ops:["Es el órgano de control económico y presupuestario de la Generalitat, comisionado por Les Corts","Es el Alto Comisionado de Les Corts, designado por éstas, que vela por la defensa de los derechos y libertades en el ámbito competencial y territorial de la Comunitat Valenciana","Es el órgano consultivo supremo del Consell en materia jurídica","Es el tribunal de arbitraje de la Comunitat Valenciana para conflictos entre ciudadanos y la Administración"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 38 EACV define al Síndic de Greuges como «el Alto Comisionado de Les Corts, designado por éstas, que velará por la defensa de los derechos y libertades reconocidos en los Títulos I de la CE y II del presente Estatuto, en el ámbito competencial y territorial de la Comunitat Valenciana». Informa anualmente a Les Corts. Es el equivalente autonómico del Defensor del Pueblo."},
  {p:"El artículo 39 EACV regula la Sindicatura de Comptes. ¿Cuál es su función?",ops:["Es el órgano asesor de Les Corts en materia presupuestaria y fiscal","Es el órgano al que corresponde el control externo económico y presupuestario de la actividad financiera de la Generalitat, los entes locales de su territorio y el resto del sector público valenciano","Es el órgano de inspección interna del Consell en materia de gastos públicos","Es el tribunal administrativo para la resolución de recursos en materia tributaria autonómica"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 39 EACV establece que «la Sindicatura de Comptes es el órgano al que corresponde el control externo económico y presupuestario de la actividad financiera de la Generalitat, de los entes locales comprendidos en su territorio y del resto del sector público valenciano». Es el equivalente autonómico del Tribunal de Cuentas."},
  {p:"El artículo 41 EACV regula L'Acadèmia Valenciana de la Llengua. ¿Qué alcance tiene su normativa lingüística?",ops:["Es orientativa; cada administración puede adaptarla a sus necesidades","La normativa lingüística de L'Acadèmia Valenciana de la Llengua será de aplicación obligatoria en todas las administraciones públicas de la Comunitat Valenciana","Es vinculante solo para la Generalitat, no para las administraciones locales","Es vinculante para las administraciones públicas pero no para los medios de comunicación privados"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 41 EACV establece que «la normativa lingüística de L'Acadèmia Valenciana de la Llengua será de aplicación obligatoria en todas las administraciones públicas de la Comunitat Valenciana». La obligatoriedad es universal para todas las administraciones del territorio autonómico."},
  {p:"El artículo 43 EACV regula el Consell Jurídic Consultiu. ¿Cuál es su naturaleza y a quién asesora?",ops:["Es el órgano fiscalizador de los contratos de la Generalitat","Es el órgano consultivo supremo del Consell, de la Administración Autonómica y, en su caso, de las administraciones locales de la Comunitat Valenciana en materia jurídica","Es el órgano arbitral para conflictos competenciales entre la Generalitat y los municipios","Es el órgano asesor de Les Corts en materia de técnica legislativa"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 43 EACV define al Consell Jurídic Consultiu como «institución de la Generalitat de carácter público» que es «el órgano consultivo supremo del Consell, de la Administración Autonómica y, en su caso, de las administraciones locales de la Comunitat Valenciana en materia jurídica». Es el equivalente autonómico del Consejo de Estado."},
  {p:"El artículo 44.3 EACV permite a Les Corts delegar en el Consell la potestad de dictar normas con rango de ley. ¿Cómo se denominan estas normas?",ops:["Decretos Legislativos del Consell","Decretos-Leyes Autonómicos","Leyes Delegadas de la Generalitat","Normas Forales Autonómicas"],c:0,exp:"<strong>Respuesta correcta: A.</strong> El art. 44.3 EACV establece que «Les Corts podrán delegar en el Consell la potestad de dictar normas con rango de Ley, denominadas Decretos Legislativos». La regulación se ajusta a los arts. 82-85 CE para los supuestos de delegación del Congreso al Gobierno de España."},
  {p:"El artículo 44.4 EACV permite al Consell dictar disposiciones legislativas provisionales en casos de urgencia. ¿Cómo se denominan y a qué deben someterse?",ops:["Decretos de Urgencia; deben ser ratificados por el President en 15 días","Decretos-leyes; sometidos a debate y votación en Les Corts, atendiendo al art. 86 CE","Normas urgentes del Consell; sometidas a control del TSJ de la CV","Decretos Legislativos de Urgencia; ratificados por Les Corts en 30 días"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 44.4 EACV establece que en casos de extraordinaria y urgente necesidad «el Consell podrá dictar disposiciones legislativas provisionales por medio de decretos-leyes sometidos a debate y votación en Les Corts, atendiendo a lo que preceptúa el artículo 86 de la Constitución Española». El modelo replica el estatal."},
  // ── TÍTULO IV: COMPETENCIAS ──
  {p:"El artículo 49.1.9.ª EACV atribuye a la Generalitat competencia exclusiva sobre una materia especialmente relevante para el territorio. ¿Cuál es?",ops:["Agricultura y ganadería","Ordenación del territorio y del litoral, urbanismo y vivienda","Transportes y comunicaciones interprovinciales","Sanidad e higiene pública"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 49.1.9.ª EACV atribuye a la Generalitat competencia exclusiva sobre «ordenación del territorio y del litoral, urbanismo y vivienda». Esta competencia es especialmente significativa en la Comunitat Valenciana por su extensa costa mediterránea y la intensa presión urbanística histórica."},
  {p:"El artículo 49.1.12.ª EACV atribuye competencia exclusiva sobre turismo. ¿Por qué es especialmente relevante para la Comunitat Valenciana?",ops:["Porque el turismo es competencia compartida y la CV tiene legislación básica más desarrollada","Porque la Comunitat Valenciana es una de las principales regiones turísticas de España y Europa, y la competencia exclusiva le permite diseñar su propia política turística","Porque los ingresos turísticos representan más del 50% del PIB autonómico","Porque la CE prohíbe la competencia estatal en turismo y la reserva a las CCAA"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 49.1.12.ª EACV atribuye a la Generalitat competencia exclusiva sobre turismo. La Comunitat Valenciana es uno de los principales destinos turísticos del mundo (especialmente la provincia de Alicante/Benidorm y Valencia ciudad), lo que hace que esta competencia tenga enorme importancia económica y política para la región."},
  {p:"Según el artículo 49.1.16.ª EACV, la Generalitat tiene competencia exclusiva sobre aprovechamientos hidráulicos y riegos. ¿Cuál es el límite territorial de esta competencia?",ops:["Sobre todos los aprovechamientos hidráulicos en territorio valenciano, independientemente de la cuenca","Solo cuando las aguas discurran íntegramente dentro del territorio de la Comunitat Valenciana","Sobre las aguas subterráneas y los acuíferos situados bajo territorio valenciano","Sobre los riegos históricos reconocidos por el Tribunal de las Aguas de Valencia"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 49.1.16.ª EACV atribuye competencia exclusiva sobre «aprovechamientos hidráulicos, canales y riegos, cuando las aguas discurran íntegramente dentro del territorio de la Comunitat Valenciana». Si las aguas atraviesan otro territorio o son compartidas entre CCAA, la competencia corresponde al Estado."},
  {p:"El artículo 50 EACV enumera las materias sobre las que la Generalitat tiene competencia de desarrollo legislativo y ejecución. ¿En qué marco actúa en estas materias?",ops:["En el marco de los Estatutos de las demás CCAA y de los convenios bilaterales con el Estado","En el marco de la legislación básica del Estado, y en su caso, en los términos que la misma establezca","En el marco exclusivo de la legislación de la UE, con adaptación a las peculiaridades valencianas","En el marco del Estatuto de Autonomía y de las leyes del Estado que expresamente lo autoricen"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 50 EACV establece que las competencias de desarrollo legislativo y ejecución se ejercen «en el marco de la legislación básica del Estado, y, en su caso, en los términos que la misma establezca». Esta técnica normativa distingue entre la legislación básica estatal (que fija los mínimos) y el desarrollo autonómico (que puede establecer mejoras o especialidades)."},
  {p:"El artículo 51.1.1.ª EACV atribuye a la Generalitat la ejecución de la legislación laboral del Estado. ¿Qué competencia se reserva expresamente el Estado?",ops:["La determinación del salario mínimo interprofesional","La alta inspección y el fomento activo de la ocupación","La negociación colectiva y la resolución de conflictos laborales","La regulación de las condiciones de trabajo de los funcionarios autonómicos"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 51.1.1.ª EACV establece que corresponde a la Generalitat la ejecución de la legislación laboral «sin perjuicio de la alta inspección de éste [el Estado], y el fomento activo de la ocupación». La alta inspección es el mecanismo estatal de supervisión del correcto ejercicio de las competencias autonómicas."},
  {p:"El artículo 53 EACV atribuye a la Generalitat competencia exclusiva en materia educativa. ¿Qué límites establece expresamente?",ops:["Solo está limitada por el derecho a la educación del art. 27 CE, sin más condiciones","Sin perjuicio del art. 27 CE, de las leyes orgánicas que lo desarrollan, de las facultades del Estado del art. 149.1.30.ª CE y de la alta inspección estatal","Limitada únicamente por las bases estatales en materia de educación básica obligatoria","Sin límites, dado que se trata de competencia exclusiva plena"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 53.1 EACV establece la competencia exclusiva sobre enseñanza «sin perjuicio de lo que disponen el artículo 27 de la CE y las Leyes Orgánicas que lo desarrollan, de las facultades que atribuye al Estado el número 30 del apartado 1 del artículo 149 de la CE, y de la alta inspección necesaria para su cumplimiento y garantía»."},
  {p:"El artículo 55 EACV regula la Policía Autónoma de la Comunitat Valenciana. ¿A quién corresponde el mando supremo de la Policía Autónoma?",ops:["Al Conseller competente en materia de Interior","A la Generalitat, en el marco de la LO del art. 149.1.29.ª CE","Al President de la Generalitat, de forma personal e indelegable","Al Delegado del Gobierno, dado que la seguridad pública es competencia estatal"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 55.3 EACV establece que «es competencia de la Generalitat, en el marco de la Ley Orgánica a que se refiere el artículo 149.1.29.ª de la Constitución, el mando supremo de la Policía Autónoma y la coordinación de la actuación de las policías locales de la Comunitat Valenciana». El mando se atribuye a la Generalitat como institución, no a una persona concreta."},
  {p:"El artículo 55.5 EACV prevé la creación de un órgano mixto de coordinación de seguridad. ¿Cuál es y cómo se compone?",ops:["Una Comisión Bilateral de Seguridad, presidida por el Delegado del Gobierno y con representación paritaria","La Junta de Seguridad, presidida por el President de la Generalitat y con representación paritaria del Estado y de la Generalitat","Un Consell de Seguretat, presidido alternamente por el President de la CV y el Ministro del Interior","Una Comisión de Coordinación Policial, presidida por el Conseller de Interior"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 55.5 EACV establece que «se creará la Junta de Seguridad que, bajo la Presidencia del President de la Generalitat y con representación paritaria del Estado y de la Generalitat, coordinará las actuaciones de la Policía Autónoma y de los Cuerpos y Fuerzas de Seguridad del Estado»."},
  {p:"El artículo 57 EACV hace referencia a un símbolo histórico y cultural del antiguo Reino de Valencia. ¿Cuál es?",ops:["El Tribunal de las Aguas de la Vega de Valencia","El Real Monasterio de Santa María de la Valldigna","La Lonja de la Seda de Valencia","El Palacio de la Generalitat, sede histórica del poder valenciano"],c:1,exp:"<strong>Respuesta correcta: B.</strong> El art. 57 EACV declara que «el Real Monasterio de Santa María de la Valldigna es templo espiritual, histórico y cultural del antiguo Reino de Valencia» y lo define como «símbolo de la grandeza del Pueblo Valenciano reconocido como Nacionalidad Histórica». La Generalitat debe recuperarlo, restaurarlo y conservarlo."}
];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prepararPreguntas(){const m=shuffle(BANCO);return m.map(q=>{const ct=q.ops[q.c];const no=shuffle(q.ops);return{p:q.p,ops:no,c:no.indexOf(ct),exp:q.exp};});}
let preguntas=[],respondidas=0,correctas=0,incorrectas=0;
function actualizarBarra(){const pct=preguntas.length?(respondidas/preguntas.length)*100:0;document.getElementById('barraFill').style.width=pct+'%';document.getElementById('barraNum').textContent=respondidas+' / '+preguntas.length;document.getElementById('scoreOk').textContent='✓ '+correctas;document.getElementById('scoreKo').textContent='✗ '+incorrectas;}
function responder(qi,oi){const q=preguntas[qi];const btns=document.querySelectorAll('[data-qi="'+qi+'"]');btns.forEach(b=>b.disabled=true);btns.forEach((b,j)=>{if(j===q.c)b.classList.add('correcta');else if(j===oi&&oi!==q.c)b.classList.add('incorrecta');});document.getElementById('exp-'+qi).classList.add('visible');respondidas++;if(oi===q.c)correctas++;else incorrectas++;actualizarBarra();if(respondidas===preguntas.length)setTimeout(mostrarResultado,700);}
function mostrarResultado(){const pct=Math.round((correctas/preguntas.length)*100);document.getElementById('resPunt').innerHTML=correctas+' <span>/ '+preguntas.length+'</span>';document.getElementById('resCorr').textContent=correctas;document.getElementById('resIncorr').textContent=incorrectas;document.getElementById('resPct').textContent=pct+'%';let txt,col,bg;if(pct>=90){txt='🏆 Sobresaliente';col='#166534';bg='#f0fdf4';}else if(pct>=75){txt='✅ Notable';col='#1e3a5f';bg='#eff6ff';}else if(pct>=60){txt='📘 Aprobado';col='#92400e';bg='#fffbeb';}else{txt='❌ Insuficiente — ¡Sigue practicando!';col='#991b1b';bg='#fef2f2';}document.getElementById('resCalif').innerHTML='<span class="calif-badge" style="background:'+bg+';color:'+col+'">'+txt+'</span>';const el=document.getElementById('resultado');el.classList.add('visible');el.scrollIntoView({behavior:'smooth',block:'center'});}
function render(){respondidas=0;correctas=0;incorrectas=0;preguntas=prepararPreguntas();actualizarBarra();const main=document.getElementById('mainContent');main.innerHTML='';const letras=['A','B','C','D'];preguntas.forEach((q,i)=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="card-num">Pregunta '+(i+1)+' de '+preguntas.length+'</div><div class="card-pregunta">'+q.p+'</div><div class="opciones">'+q.ops.map((op,j)=>'<button class="opcion" data-qi="'+i+'" onclick="responder('+i+','+j+')"><span class="letra">'+letras[j]+')</span><span>'+op+'</span></button>').join('')+'</div><div class="explicacion" id="exp-'+i+'">'+q.exp+'</div>';main.appendChild(card);});const sep=document.createElement('div');sep.className='divider';sep.textContent='Fin del test';main.appendChild(sep);const res=document.createElement('div');res.className='resultado';res.id='resultado';res.innerHTML='<div class="resultado-eyebrow">Resultado final</div><h2>Test completado</h2><div class="resultado-nota" id="resPunt">0 <span>/ 50</span></div><div id="resCalif"></div><div class="stats"><div class="stat"><div class="stat-num" id="resCorr" style="color:#166534">0</div><div class="stat-lab">Correctas</div></div><div class="stat"><div class="stat-num" id="resIncorr" style="color:#991b1b">0</div><div class="stat-lab">Incorrectas</div></div><div class="stat"><div class="stat-num" id="resPct">0%</div><div class="stat-lab">% aciertos</div></div></div><p class="resultado-hint">Desplázate hacia arriba para revisar las explicaciones de cada pregunta.</p><button class="btn btn-naranja" onclick="render();window.scrollTo({top:0,behavior:\'smooth\'})">↺ Repetir con nuevo orden</button>';main.appendChild(res);}
render();
</script>
</body>
</html>
